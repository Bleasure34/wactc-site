<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="WACTC Staff Apparel - Men's & Women's options selected for staff">
    <title>Staff Apparel - WACTC</title>
    <link rel="stylesheet" href="../assets/css/styles.css?v=20260601">
    <style>
        .programs-grid {
            grid-template-columns: repeat(5, 1fr);
        }
        .program-image-card {
            aspect-ratio: 2/3;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-container">
                <a href="../" class="logo">
                    <img src="../assets/img/logo.png" alt="WACTC Logo" width="75" height="75">
                </a>
                <a href="../cart/" class="cart-link">Cart</a>
            </div>
        </div>
    </header>

    <main>
        <div class="page-header">
            <div class="container">
                <h1>Staff Apparel</h1>
                <p>Select a category to view available options.</p>
            </div>
        </div>

        <div class="container">
            <div class="programs-grid">
                <a href="polos.html" class="program-image-card" aria-label="Shop Polos">
                    <img src="../assets/img/previews/CS418_M_Light-Grey_F.png" alt="Polos" class="program-image">
                    <div class="program-overlay">
                        <h3>Polos</h3>
                    </div>
                </a>

                <a href="button-downs.html" class="program-image-card" aria-label="Shop Button-Downs">
                    <img src="../assets/img/previews/W808_F_Regatta-Blue_F.png" alt="Button-Downs" class="program-image">
                    <div class="program-overlay">
                        <h3>Button-Downs</h3>
                    </div>
                </a>

                <a href="sweatshirts.html" class="program-image-card" aria-label="Shop Sweatshirts">
                    <img src="../assets/img/previews/ST253_M_Maroon_F.png" alt="Sweatshirts" class="program-image">
                    <div class="program-overlay">
                        <h3>Sweatshirts</h3>
                    </div>
                </a>

                <a href="fleece-jackets.html" class="program-image-card" aria-label="Shop Fleece Jackets">
                    <img src="../assets/img/previews/F217_M_True-Navy_F.png" alt="Fleece Jackets" class="program-image">
                    <div class="program-overlay">
                        <h3>Fleece Jackets</h3>
                    </div>
                </a>

                <a href="accessories.html" class="program-image-card" aria-label="Shop Accessories">
                    <img src="../assets/img/previews/WACTC-CAP_M_Black_F.png" alt="Accessories" class="program-image">
                    <div class="program-overlay">
                        <h3>Accessories</h3>
                    </div>
                </a>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2024 WACTC. All rights reserved.</p>
                <p>Contact: <a href="mailto:tntmfg@comcast.net">tntmfg@comcast.net</a></p>
            </div>
        </div>
    </footer>

    <script src="../assets/js/main.js?v=20260601"></script>
    <script>sessionStorage.setItem('wactc_site_context', 'staff');</script>
</body>
</html>
