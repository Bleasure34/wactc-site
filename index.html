<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="WACTC Apparel Store - Your full business apparel solution for students and staff">
    <title>WACTC Apparel Store</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-container">
                <a href="/" class="logo">
                    <img src="assets/img/logo.png" alt="WACTC Logo" width="200" height="200">
                </a>
                <a href="cart/" class="cart-link">Cart</a>
            </div>
        </div>
    </header>

    <main>
        <h1 class="visually-hidden">Welcome to the WACTC Apparel Store</h1>
        
        <div class="hero-split">
            <a href="students/" class="hero-panel students" aria-label="Shop Student Apparel - Choose your program to view approved gear">
                <h2>Student<br>Apparel</h2>
                <p>Choose your program to view approved gear.</p>
                <button class="btn btn-primary">START SHOPPING</button>
            </a>
            
            <a href="staff/" class="hero-panel staff" aria-label="Shop Staff Apparel - Men's & Women's options selected for staff">
                <h2>Staff<br>Apparel</h2>
                <p>Men's & Women's options selected for staff.</p>
                <button class="btn btn-secondary">START SHOPPING</button>
            </a>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2024 WACTC. All rights reserved.</p>
                <p>Contact: <a href="mailto:tntmfg@comcast.net">tntmfg@comcast.net</a></p>
            </div>
        </div>
    </footer>

    <!-- Main Application -->
    <script src="assets/js/main.js"></script>
</body>
</html>
