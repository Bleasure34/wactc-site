# Supabase Edge Functions Configuration

[functions.send-order-email]
# SECURITY: verify_jwt = false allows calls without user authentication
# This is acceptable because:
# 1. Function validates API key in request headers
# 2. Input validation prevents malicious data
# 3. Rate limiting prevents abuse
# 4. SMTP credentials are in environment variables (not exposed)
verify_jwt = false  # Allow anonymous function calls (secured by API key validation)

[functions.webhooks-square]
# SECURITY: verify_jwt = false allows webhooks from Square without JWT
# This is required because:
# 1. Square webhooks cannot send Supabase JWT tokens
# 2. Square signs webhooks with x-square-hmacsha256-signature header
# 3. Function verifies webhook authenticity via Square signature (TODO: implement full verification)
# 4. Only processes specific event types (payment.created, payment.updated)
verify_jwt = false  # Allow Square webhooks (secured by Square signature verification)


